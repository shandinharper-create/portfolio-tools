// Dual storage: localStorage (any browser) + window.storage (Claude.ai)
// writeSeed=false means don't write fallback — prevents PC from overwriting Grasshopper's board/card data

        valRef.current = p;
        setValState(p);
        loaded = true;
      }
    } catch {}

      try {
        if (typeof window.storage !== 'undefined' && window.storage) {
          const r = await window.storage.get(key);
          if (r && r.value !== undefined) {
            const p = JSON.parse(r.value);
            valRef.current = p;
            setValState(p);
            loaded = true;
            try {
              localStorage.setItem(key, r.value);
            } catch {}
          }
        }
      } catch {}
      if (!loaded && writeSeed) {
        const s = JSON.stringify(fallback);
        try {
          localStorage.setItem(key, s);
        } catch {}
        try {
          if (typeof window.storage !== 'undefined' && window.storage) await window.storage.set(key, s);
        } catch {}
      }
      setReady(true);
    })();

    const next = typeof nv === 'function' ? nv(valRef.current) : nv;
    valRef.current = next;
    setValState(next);
    const s = JSON.stringify(next);
    try {
      localStorage.setItem(key, s);
    } catch {}
    setTimeout(() => {
      try {
        if (typeof window.storage !== 'undefined' && window.storage) window.storage.set(key, s).catch(() => {});
      } catch {}
    }, 0);
  }, [key]);
  return [val, setVal, ready];
}
